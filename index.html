<!DOCTYPE html>
<html>
<head>
  <title>Catch Phrase Wheel Generator</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
    }

    textarea {
      width: 300px;
      height: 200px;
    }

    svg {
      margin-top: 20px;
    }

    @media print {
      body * {
        visibility: hidden;
      }
      #wheelContainer, #wheelContainer * {
        visibility: visible;
      }
      #wheelContainer {
        position: absolute;
        left: 0;
        top: 0;
      }
    }
  </style>
</head>
<body>

<h2>Catch Phrase 72-Item Wheel Generator</h2>

<p>Enter exactly 72 phrases (one per line):</p>
<textarea id="phrases"></textarea><br><br>
<button onclick="generateWheel()">Generate Wheel</button>
<button onclick="window.print()">Print</button>

<div id="wheelContainer"></div>

<script>
function generateWheel() {
  const text = document.getElementById("phrases").value.trim();
  const items = text.split("\n").filter(i => i.trim() !== "");

  if (items.length !== 72) {
    alert("You must enter exactly 72 items.");
    return;
  }

  const sizeInches = 4.5;
  const radius = sizeInches / 2;

  const innerRadius = 1.6;   // inner text ring start
  const outerRadius = 2.1;   // outer text ring end

  const angleStep = 360 / 72;

  let svg = `
  <svg width="${sizeInches}in" height="${sizeInches}in"
       viewBox="-${radius} -${radius} ${sizeInches} ${sizeInches}"
       xmlns="http://www.w3.org/2000/svg">

    <!-- Outer Circle -->
    <circle cx="0" cy="0" r="${radius}"
            fill="none" stroke="black" stroke-width="0.02"/>

    <!-- Inner Ring Boundary -->
    <circle cx="0" cy="0" r="${innerRadius}"
            fill="none" stroke="black" stroke-width="0.01"/>

    <circle cx="0" cy="0" r="${outerRadius}"
            fill="none" stroke="black" stroke-width="0.01"/>
  `;

  for (let i = 0; i < 72; i++) {
    const angle = i * angleStep;

    svg += `
      <g transform="rotate(${angle})">
        <line x1="${innerRadius}" y1="0"
              x2="${outerRadius}" y2="0"
              stroke="black" stroke-width="0.01"/>
      </g>
    `;

    const textAngle = angle + angleStep / 2;

    svg += `
      <g transform="rotate(${textAngle})">
        <text x="${outerRadius - 0.05}"
              y="0"
              font-size="0.12"
              text-anchor="end"
              dominant-baseline="middle"
              transform="rotate(90)"
              fill="black">
          ${items[i]}
        </text>
      </g>
    `;
  }

  svg += `</svg>`;

  document.getElementById("wheelContainer").innerHTML = svg;
}
</script>

</body>
</html>
