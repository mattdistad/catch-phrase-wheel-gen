<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Catch Phrase Wheel</title>
<style>
  body {
    display: flex;
    justify-content: flex-start;
    align-items: flex-start;
    gap: 40px;
    font-family: sans-serif;
    margin: 20px;
  }

  #wheelContainer {
    flex-shrink: 0;
  }

  #inputContainer {
    display: flex;
    flex-direction: column;
    width: 300px;
  }

  #phrases {
    width: 100%;
    height: 600px; /* Enough for 72 items */
    font-family: monospace;
    font-size: 14px;
  }

  #counter {
    margin-top: 10px;
    font-weight: bold;
  }

  button {
    margin-top: 10px;
    padding: 8px;
    font-size: 16px;
  }
</style>
</head>
<body>

<div id="wheelContainer">
  <!-- Wheel will be rendered here -->
</div>

<div id="inputContainer">
  <textarea id="phrases" placeholder="Enter 72 items, one per line"></textarea>
  <div id="counter">Items entered: 0</div>
  <button onclick="generateWheel()">Generate Wheel</button>
</div>

<script>
const textarea = document.getElementById("phrases");
const counter = document.getElementById("counter");

// Update counter in real time
textarea.addEventListener("input", () => {
  const lines = textarea.value.split("\n").filter(line => line.trim() !== "");
  counter.textContent = `Items entered: ${lines.length}`;
});

function generateWheel() {
  const text = textarea.value.trim();
  const items = text.split("\n").map(i => i.trim()).filter(i => i !== "");

  // Validate 72 items
  if (items.length !== 72) {
    alert(`You must enter exactly 72 items. You currently have ${items.length}.`);
    return;
  }

  // Validate max 20 characters per item
  for (let i = 0; i < items.length; i++) {
    if (items[i].length > 20) {
      alert(`Item ${i + 1} exceeds 20 characters:\n"${items[i]}"`);
      return;
    }
  }

  const sizeInches = 4.5;
  const radius = sizeInches / 2;

  const innerRadius = 1.6;
  const outerRadius = 2.1;

  const screwHoleRadius = 0.12;
  const screwCircleRadius = radius - 0.3;

  const angleStep = 360 / 72;

  let svg = `
  <svg width="${sizeInches}in" height="${sizeInches}in"
       viewBox="-${radius} -${radius} ${sizeInches} ${sizeInches}"
       xmlns="http://www.w3.org/2000/svg">

    <!-- Outer Circle -->
    <circle cx="0" cy="0" r="${radius}"
            fill="none" stroke="black" stroke-width="0.02"/>

    <!-- Inner Ring Boundary -->
    <circle cx="0" cy="0" r="${innerRadius}"
            fill="none" stroke="black" stroke-width="0.01"/>

    <circle cx="0" cy="0" r="${outerRadius}"
            fill="none" stroke="black" stroke-width="0.01"/>
  `;

  // Radial divider lines + text
  for (let i = 0; i < 72; i++) {
    const angle = i * angleStep;

    svg += `
      <g transform="rotate(${angle})">
        <line x1="${innerRadius}" y1="0"
              x2="${outerRadius}" y2="0"
              stroke="black" stroke-width="0.01"/>
      </g>
    `;

    const textAngle = angle + angleStep / 2;

    svg += `
      <g transform="rotate(${textAngle})">
        <text x="${outerRadius - 0.05}"
              y="0"
              font-size="0.11"
              text-anchor="end"
              dominant-baseline="middle"
              transform="rotate(90)"
              fill="black">
          ${items[i]}
        </text>
      </g>
    `;
  }

  // Add three screw holes (evenly spaced 120° apart)
  for (let i = 0; i < 3; i++) {
    const angle = i * 120;
    const radians = angle * (Math.PI / 180);
    const x = screwCircleRadius * Math.cos(radians);
    const y = screwCircleRadius * Math.sin(radians);

    svg += `
      <circle cx="${x}" cy="${y}"
              r="${screwHoleRadius}"
              fill="none"
              stroke="black"
              stroke-width="0.02"/>
    `;
  }

  svg += `</svg>`;

  document.getElementById("wheelContainer").innerHTML = svg;
}
</script>

</body>
</html>
